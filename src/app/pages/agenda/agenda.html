<div class="space-y-4">
  <!-- Header -->
  <div class="flex items-center justify-between">
    <!-- View Tabs -->
    <div class="tabs tabs-lifted">
      <button
        type="button"
        class="tab"
        [class.tab-active]="currentView() === 'weekly'"
        (click)="switchView('weekly')"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          style="width: 1.25rem; height: 1.25rem;"
          fill="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            d="M5 3h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2zm0 2v4h14V5H5zm0 6v8h14v-8H5z"
          />
        </svg>
        Semanal
      </button>

      <button
        type="button"
        class="tab"
        [class.tab-active]="currentView() === 'monthly'"
        (click)="switchView('monthly')"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          style="width: 1.25rem; height: 1.25rem;"
          fill="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"
          />
        </svg>
        Mensal
      </button>
    </div>

    <!-- Botão Novo Evento -->
    <button
      type="button"
      style="background-color: var(--color-primary); color: var(--color-primary-content); padding: 0.5rem 1rem; border-radius: 0.25rem; border: none; cursor: pointer; font-weight: 600; white-space: nowrap;"
      (click)="abrirNovoEvento()"
    >
      Novo Evento
    </button>
  </div>

  <!-- Content -->
  <div class="rounded-lg bg-base-100 p-4">
    @if (currentView() === 'weekly') {
      <app-weekly
        (abrirEvento)="abrirEditarEvento($event)"
        (novoEvento)="abrirNovoEventoComData($event.data, $event.hora)"
      ></app-weekly>
    } @else if (currentView() === 'monthly') {
      <app-monthly></app-monthly>
    }
  </div>

  <!-- Modal de Evento -->
  @if (showEventoModal()) {
    <app-evento-modal
      [evento]="eventoEditando() || undefined"
      [dataInicial]="dataInicial()"
      [horaInicial]="horaInicial()"
      (salvo)="salvarEvento($event)"
      (fechado)="fecharModal()"
    ></app-evento-modal>
  }
</div>
