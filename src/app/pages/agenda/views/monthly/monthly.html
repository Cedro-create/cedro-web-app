<div class="space-y-4">
  <!-- Navigation -->
  <div class="flex items-center justify-between">
    <button
      type="button"
      class="btn btn-sm btn-outline"
      (click)="previousMonth()"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-4 w-4"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M15 19l-7-7 7-7"
        />
      </svg>
      Anterior
    </button>

    <h2 class="text-lg font-semibold">{{ getMonthYear() }}</h2>

    <button
      type="button"
      class="btn btn-sm btn-outline"
      (click)="nextMonth()"
    >
      Próximo
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-4 w-4"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M9 5l7 7-7 7"
        />
      </svg>
    </button>
  </div>

  <!-- Calendar Grid -->
  <div class="space-y-2">
    <!-- Day of week headers -->
    <div class="grid grid-cols-7 gap-2">
      @for (dayLabel of dayOfWeekLabels; track dayLabel) {
        <div class="text-center text-sm font-semibold text-base-content/60">
          {{ dayLabel }}
        </div>
      }
    </div>

    <!-- Days -->
    <div class="space-y-2">
      @for (week of days(); track $index) {
        <div class="grid grid-cols-7 gap-2">
          @for (day of week; track day) {
            <button
              type="button"
              [disabled]="day === null"
              (click)="selectDay(day)"
              class="btn btn-sm h-16 w-full"
              [class.btn-primary]="isToday(day)"
              [class.btn-outline]="!isToday(day) && day !== null"
              [class.opacity-30]="day === null"
              [class.cursor-not-allowed]="day === null"
            >
              {{ day }}
            </button>
          }
        </div>
      }
    </div>
  </div>

  <!-- Day Modal -->
  @if (showDayModal() && selectedDay()) {
    <div class="modal modal-open">
      <div class="modal-box w-full max-w-2xl">
        <div class="flex items-center justify-between">
          <h3 class="text-lg font-bold">
            {{ selectedDay() | date: 'EEEE, d MMMM yyyy':undefined:'pt-BR' }}
          </h3>
          <button
            type="button"
            class="btn btn-circle btn-sm btn-ghost"
            (click)="closeDayModal()"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </button>
        </div>

        <div class="my-4">
          <app-day [selectedDate]="selectedDay()!"></app-day>
        </div>

        <div class="modal-action">
          <button
            type="button"
            class="btn btn-outline btn-sm"
            (click)="closeDayModal()"
          >
            Fechar
          </button>
        </div>
      </div>

      <form method="dialog" class="modal-backdrop" (ngSubmit)="closeDayModal()">
        <button type="submit"></button>
      </form>
    </div>
  }
</div>
