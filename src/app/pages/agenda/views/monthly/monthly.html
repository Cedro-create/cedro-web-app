<div class="space-y-4">
  <!-- Navigation -->
  <div class="flex items-center justify-between">
    <button
      type="button"
      style="background-color: var(--color-base-200); color: var(--color-base-content); border: 1px solid var(--color-base-300); padding: 0.5rem; border-radius: 0.25rem; cursor: pointer; display: flex; align-items: center; justify-content: center; white-space: nowrap;"
      (click)="previousMonth()"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        style="width: 1rem; height: 1rem;"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M15 19l-7-7 7-7"
        />
      </svg>
    </button>

    <h2 class="text-lg font-semibold">{{ getMonthYear() }}</h2>

    <button
      type="button"
      style="background-color: var(--color-base-200); color: var(--color-base-content); border: 1px solid var(--color-base-300); padding: 0.5rem; border-radius: 0.25rem; cursor: pointer; display: flex; align-items: center; justify-content: center; white-space: nowrap;"
      (click)="nextMonth()"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        style="width: 1rem; height: 1rem;"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M9 5l7 7-7 7"
        />
      </svg>
    </button>
  </div>

  <!-- Calendar Grid -->
  <div style="border: 1px solid var(--color-base-300); border-radius: 0.25rem; padding: 1rem; background-color: var(--color-base-100);">
    <!-- Day of week headers -->
    <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.5rem; margin-bottom: 1rem;">
      @for (dayLabel of dayOfWeekLabels; track dayLabel) {
        <div style="text-align: center; font-size: 0.875rem; font-weight: 600; color: var(--color-base-content); opacity: 0.6;">
          {{ dayLabel }}
        </div>
      }
    </div>

    <!-- Days -->
    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
      @for (week of days(); track $index) {
        <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.5rem;">
          @for (day of week; track day) {
            <button
              type="button"
              [disabled]="day === null"
              (click)="selectDay(day)"
              style="
                padding: 1rem;
                border: 1px solid var(--color-base-300);
                border-radius: 0.25rem;
                cursor: {{day === null ? 'not-allowed' : 'pointer'}};
                font-weight: 600;
                font-size: 1rem;
                transition: all 0.2s;
                {{isToday(day) ? 'background-color: var(--color-primary); color: var(--color-primary-content); border-color: var(--color-primary);' : 'background-color: var(--color-base-200); color: var(--color-base-content);'}}
                {{day === null ? 'opacity: 0.3; background-color: transparent; border: none;' : ''}}
              "
              [class.opacity-30]="day === null"
            >
              {{ day }}
            </button>
          }
        </div>
      }
    </div>
  </div>

  <!-- Day Modal -->
  @if (showDayModal() && selectedDay()) {
    <div class="modal modal-open">
      <div class="modal-box w-full max-w-2xl">
        <div class="flex items-center justify-between">
          <h3 class="text-lg font-bold">
            {{ selectedDay() | date: 'EEEE, d MMMM yyyy':undefined:'pt-BR' }}
          </h3>
          <button
            type="button"
            class="btn btn-circle btn-sm btn-ghost"
            (click)="closeDayModal()"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </button>
        </div>

        <div class="my-4">
          <app-day [selectedDate]="selectedDay()!"></app-day>
        </div>

        <div class="modal-action">
          <button
            type="button"
            class="btn btn-outline btn-sm"
            (click)="closeDayModal()"
          >
            Fechar
          </button>
        </div>
      </div>

      <form method="dialog" class="modal-backdrop" (ngSubmit)="closeDayModal()">
        <button type="submit"></button>
      </form>
    </div>
  }
</div>
