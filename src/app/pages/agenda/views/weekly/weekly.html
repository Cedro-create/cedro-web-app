<div class="space-y-4">
  <!-- Navigation -->
  <div class="flex items-center justify-between">
    <button
      type="button"
      style="background-color: var(--color-base-200); color: var(--color-base-content); border: 1px solid var(--color-base-300); padding: 0.5rem; border-radius: 0.25rem; cursor: pointer; display: flex; align-items: center; justify-content: center; white-space: nowrap;"
      (click)="previousWeek()"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        style="width: 1rem; height: 1rem;"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M15 19l-7-7 7-7"
        />
      </svg>
    </button>

    <h2 class="text-lg font-semibold">{{ getWeekLabel() }}</h2>

    <button
      type="button"
      style="background-color: var(--color-base-200); color: var(--color-base-content); border: 1px solid var(--color-base-300); padding: 0.5rem; border-radius: 0.25rem; cursor: pointer; display: flex; align-items: center; justify-content: center; white-space: nowrap;"
      (click)="nextWeek()"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        style="width: 1rem; height: 1rem;"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M9 5l7 7-7 7"
        />
      </svg>
    </button>
  </div>

  <!-- Weekly Grid -->
  <div style="border: 1px solid var(--color-base-300); border-radius: 0.25rem; background-color: var(--color-base-100); overflow-x: auto;">
    <div class="min-w-max">
      <!-- Header with days -->
      <div class="sticky top-0 z-10 mb-0 grid" style="grid-template-columns: 60px repeat(7, 1fr);">
        <!-- Time column header -->
        <div style="border-bottom: 2px solid var(--color-base-300); background-color: var(--color-base-200); padding: 0.5rem; text-align: center; font-size: 0.75rem; font-weight: 600;"></div>

        <!-- Day headers -->
        @for (date of weekDates(); track date.getTime()) {
          <div
            style="border-bottom: 2px solid var(--color-base-300); padding: 0.5rem; text-align: center; font-size: 0.75rem; font-weight: 600; {{isToday(date) ? 'background-color: var(--color-primary); color: var(--color-primary-content);' : 'background-color: var(--color-base-200); color: var(--color-base-content);'}}"
          >
            <div>{{ getDateLabel(date) }}</div>
          </div>
        }
      </div>

      <!-- Time slots -->
      @for (slot of timeSlots(); track slot) {
        <div class="grid" style="grid-template-columns: 60px repeat(7, 1fr);">
          <!-- Time label -->
          <div style="border-bottom: 1px solid var(--color-base-300); background-color: var(--color-base-100); padding: 0.5rem; text-align: right; font-size: 0.75rem; font-weight: 500; color: var(--color-base-content);">
            {{ slot }}
          </div>

          <!-- Time slot cells -->
          @for (date of weekDates(); track date.getTime()) {
            @let evento = getEventoNoSlot(date, slot);
            <div
              style="border-bottom: 1px solid var(--color-base-300); border-right: 1px solid var(--color-base-300); padding: 0.25rem; cursor: pointer; transition: all 0.2s; min-height: 40px;"
              [style.background-color]="evento ? evento.cor : 'transparent'"
              [style.opacity]="evento ? '0.7' : '1'"
              [style.display]="evento ? 'flex' : 'block'"
              [style.align-items]="evento ? 'center' : 'auto'"
              [style.justify-content]="evento ? 'center' : 'auto'"
              [title]="evento ? getTooltipText(evento) : 'Clique para adicionar evento'"
              (click)="onClickSlot(date, slot)"
            >
              @if (evento) {
                <span style="font-size: 0.75rem; font-weight: 600; color: white; text-align: center; word-break: break-word; padding: 0.25rem;">
                  {{ evento.nome }}
                </span>
              }
            </div>
          }
        </div>
      }
    </div>
  </div>
</div>
