<div class="drawer lg:drawer-open">
  <input
    id="drawer-toggle"
    type="checkbox"
    class="drawer-toggle"
  />
  <div class="drawer-content flex flex-col">
    <!-- Navbar -->
    <div class="navbar bg-base-200 sticky top-0 z-40">
      <div class="flex-none gap-2">
        <label
          for="drawer-toggle"
          class="btn btn-ghost drawer-button lg:hidden"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            class="inline-block h-5 w-5 stroke-current"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            ></path>
          </svg>
        </label>
      </div>
      <div class="flex-1">
        <a class="btn btn-ghost text-xl">Cedros App</a>
      </div>
      <div class="flex-none gap-2">
        <div class="form-control"></div>
      </div>
    </div>

    <!-- Main Content -->
    <main class="flex-1 p-4">
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- Sidebar -->
  <div class="drawer-side lg:z-auto">
    <label
      for="drawer-toggle"
      aria-label="close sidebar"
      class="drawer-overlay lg:hidden"
    ></label>
    <ul class="menu min-h-screen w-80 bg-base-200 p-4 space-y-2">
      <!-- Sidebar header -->
      <li class="mb-4">
        <a class="text-lg font-bold text-primary">Cedros</a>
      </li>

      <!-- Divider -->
      <li class="my-2">
        <div class="divider m-0"></div>
      </li>

      <!-- Menu items -->
      <li>
        <a
          routerLink="/agenda"
          routerLinkActive="active"
          (click)="toggleDrawer()"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            fill="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zm-6-7h-2v2h2zm-2-2h2V7h-2z"
            />
          </svg>
          Agenda
        </a>
      </li>

      <!-- Divider -->
      <li class="my-4">
        <div class="divider m-0"></div>
      </li>

      <!-- Cadastro submenu with collapse -->
      <li>
        <details open>
          <summary class="flex items-center gap-2 cursor-pointer px-3 py-2">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-5.04-6.71l-2.75 3.54-1.3-1.54c-.2-.24-.57-.27-.84-.07-.27.2-.3.57-.1.84l1.9 2.2c.12.15.29.24.48.24s.36-.09.48-.24l3.5-4.15c.21-.25.18-.62-.07-.83-.24-.21-.62-.18-.8.03z"
              />
            </svg>
            <span>Cadastro</span>
          </summary>
          <ul class="space-y-1 pl-4">
            <li>
              <a
                routerLink="/cadastro/servicos"
                routerLinkActive="active"
                (click)="toggleDrawer()"
                class="flex items-center gap-2 px-3 py-2 text-sm"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-4 w-4"
                  fill="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zm-6-7h-2v2h2zm-2-2h2V7h-2z" />
                </svg>
                Serviços
              </a>
            </li>
            <li>
              <a
                routerLink="/cadastro/clientes"
                routerLinkActive="active"
                (click)="toggleDrawer()"
                class="flex items-center gap-2 px-3 py-2 text-sm"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-4 w-4"
                  fill="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                </svg>
                Clientes
              </a>
            </li>
            <li>
              <a
                routerLink="/cadastro/fornecedores"
                routerLinkActive="active"
                (click)="toggleDrawer()"
                class="flex items-center gap-2 px-3 py-2 text-sm"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-4 w-4"
                  fill="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-8h3l4-4-4-4zm-2 12H3V6h12v14zm-6-4l2.22-2.22-2.22-2.22V8h4v8h-4v-2z" />
                </svg>
                Fornecedores
              </a>
            </li>
          </ul>
        </details>
      </li>

      <!-- Divider for future items -->
      <li class="my-4">
        <div class="divider m-0"></div>
      </li>

      <li class="menu-title">
        <span class="text-xs uppercase opacity-70">Próximas Features</span>
      </li>

      <li class="disabled opacity-50">
        <a>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            fill="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"
            />
          </svg>
          Contatos
        </a>
      </li>

      <li class="disabled opacity-50">
        <a>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            fill="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              d="M17 2H5c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7l-5-5zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v3z"
            />
          </svg>
          Documentos
        </a>
      </li>
    </ul>
  </div>
</div>
